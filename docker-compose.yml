services:
  mysql-s0-primary:
    image: mysql:8.0
    container_name: mysql-s0-primary
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Druva@123
      MYSQL_DATABASE: tiny_url
    volumes:
      - mysql_s0_primary_data:/var/lib/mysql
      - ./shard0/primary/conf:/etc/mysql/conf.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql-s0-replica-1:
    image: mysql:8.0
    container_name: mysql-s0-replica-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Druva@123
    depends_on:
      - mysql-s0-primary
    volumes:
      - mysql_s0_replica1_data:/var/lib/mysql
      - ./shard0/replica/conf:/etc/mysql/conf.d
    ports:
      - "3308:3306"
    
  proxysql-s0:
    image: proxysql/proxysql
    container_name: proxysql-s0
    ports:
      - "6032:6032"
      - "6033:6033"
    depends_on:
      - mysql-s0-primary
      - mysql-s0-replica-1
    volumes:
      - ./shard0/proxysql.cnf:/etc/proxysql.cnf

  mysql-s1-primary:
    image: mysql:8.0
    container_name: mysql-s1-primary
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Druva@123
      MYSQL_DATABASE: tiny_url
    volumes:
      - mysql_s1_primary_data:/var/lib/mysql
      - ./shard1/primary/conf:/etc/mysql/conf.d
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql-s1-replica-1:
    image: mysql:8.0
    container_name: mysql-s1-replica-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Druva@123
    depends_on:
      - mysql-s1-primary
    volumes:
      - mysql_s1_replica1_data:/var/lib/mysql
      - ./shard1/replica/conf:/etc/mysql/conf.d
    ports:
      - "3310:3306"
    
  proxysql-s1:
    image: proxysql/proxysql
    container_name: proxysql-s1
    ports:
      - "6034:6032"
      - "6035:6033"
    depends_on:
      - mysql-s1-primary
      - mysql-s1-replica-1
    volumes:
      - ./shard1/proxysql.cnf:/etc/proxysql.cnf
    
  redis-master:
    image: redis:latest
    container_name: redis-master
    volumes:
      - redis_master_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis-replica:
    image: redis:latest
    container_name: redis-replica
    depends_on:
      - redis-master
    command: redis-server --replicaof redis-master 6379
    volumes:
      - redis_replica_data:/data
    ports:
      - "6380:6379"

  sentinel1:
    image: redis:latest
    container_name: sentinel1
    depends_on:
      - redis-master
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf
    command: redis-sentinel /etc/redis/sentinel.conf
    ports:
      - "26379:26379"

  sentinel2:
    image: redis:latest
    container_name: sentinel2
    depends_on:
      - redis-master
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf
    command: redis-sentinel /etc/redis/sentinel.conf
    ports:
      - "26380:26379"

  sentinel3:
    image: redis:latest
    container_name: sentinel3
    depends_on:
      - redis-master
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf
    command: redis-sentinel /etc/redis/sentinel.conf
    ports:
      - "26381:26379"

  app:
    build: .
    env_file:
      - .env
    environment:
      # DB_HOST: mysql-s0-primary
      # REPLICA_DB_HOST: mysql-s0-replica-1
      REDIS_MASTER_NAME: mymaster
    depends_on:
      mysql-s0-primary:
        condition: service_healthy
      mysql-s1-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    restart: on-failure

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

volumes:
  mysql_s0_primary_data:
  mysql_s0_replica1_data:
  mysql_s1_primary_data:
  mysql_s1_replica1_data:
  redis_master_data:
  redis_replica_data: